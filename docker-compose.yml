services:
  jirrabit-db:
    image: postgres:18.3-alpine3.23
    env_file:
      - .env
    volumes:
      - jirrabitdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${JIRRABIT_DB_USER:-jirrabit}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    # Backs Channels group fanout so multi-process daphne stays in sync.
    image: redis:8.6.3-alpine3.23
    env_file:
      - .env
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file:
      - .env
    depends_on:
      jirrabit-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: ["runserver"]

volumes:
  jirrabitdata:

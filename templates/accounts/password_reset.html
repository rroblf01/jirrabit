{% extends "base.html" %}
{% block anon %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--blue-700),var(--blue-900));">
  <div class="card" style="width:380px; max-width:90vw;">
    <h1 style="color:var(--blue-800);">Recuperar contraseña</h1>
    <p style="color:var(--ink-500); font-size:13px;">Te enviamos un correo con un enlace para resetearla.</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-row"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="errors">{{ field.errors|join:", " }}</div>{% endif %}</div>
      {% endfor %}
      <button class="btn" type="submit" style="width:100%;">Enviar enlace</button>
    </form>
    <p style="margin-top:14px; font-size:13px; text-align:center;"><a href="{% url 'accounts:login' %}">Volver</a></p>
  </div>
</div>
{% endblock %}

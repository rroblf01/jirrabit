{% extends "base.html" %}
{% block anon %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--blue-700),var(--blue-900));">
  <div class="card" style="width:420px; max-width:90vw;">
    <h1 style="margin:0 0 12px 0; color:var(--blue-800);">Crear cuenta</h1>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-row">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}<div style="font-size:12px;color:var(--ink-500)">{{ field.help_text|safe }}</div>{% endif %}
        {% if field.errors %}<div class="errors">{{ field.errors|join:", " }}</div>{% endif %}
      </div>
      {% endfor %}
      <button class="btn" style="width:100%;" type="submit">Registrarme</button>
    </form>
    <p style="margin-top:14px; font-size:13px; text-align:center;">
      ¿Ya tienes cuenta? <a href="{% url 'accounts:login' %}">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}

<span class="inline-edit" hx-get="{% url 'issues:inline_edit_form' issue.key 'priority' %}"
      hx-target="this" hx-swap="outerHTML" hx-disinherit="*" title="Click para cambiar" style="cursor:pointer;">
  <span class="priority-dot" style="background:{{ issue.priority.color }}"></span>{{ issue.priority.name }}
</span>

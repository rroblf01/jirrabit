<div class="inline-edit" hx-get="{% url 'issues:inline_edit_form' issue.key 'description' %}"
     hx-target="this" hx-swap="outerHTML" title="Click para editar"
     style="white-space:pre-wrap; background:var(--ink-50); padding:14px; border-radius:8px; cursor:text; min-height:50px;">
  {% if issue.description %}{{ issue.description_html|safe }}{% else %}<em style="color:var(--ink-500);">(sin descripción — click para añadir)</em>{% endif %}
</div>

<form hx-post="{% url 'issues:inline_edit' issue.key field %}" hx-target="this" hx-swap="outerHTML" hx-disinherit="*" style="display:inline;">
  {% csrf_token %}
  <input type="date" name="value" value="{{ value }}" autofocus
         onchange="this.form.requestSubmit()" onblur="this.form.requestSubmit()">
</form>

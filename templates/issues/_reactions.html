{% load i18n %}
<div class="reactions" id="reactions-{{ c.pk }}">
  {% for r in reactions %}
    <form hx-post="{% url 'issues:react' c.pk %}" hx-target="closest .reactions" hx-swap="outerHTML"
          style="display:inline;">
      {% csrf_token %}
      <input type="hidden" name="emoji" value="{{ r.emoji }}">
      <button class="chip reaction-chip{% if r.mine %} active{% endif %}" type="submit"
              title="{{ r.count }} {% trans 'reacciones' %}">
        {{ r.label }} {{ r.count }}
      </button>
    </form>
  {% endfor %}

  <span class="reactions-quick" aria-label="{% trans 'Reacciones rápidas' %}">
    <form hx-post="{% url 'issues:react' c.pk %}" hx-target="closest .reactions" hx-swap="outerHTML"><input type="hidden" name="emoji" value="+1">{% csrf_token %}<button type="submit" class="reactions-quick-btn" title="👍">👍</button></form>
    <form hx-post="{% url 'issues:react' c.pk %}" hx-target="closest .reactions" hx-swap="outerHTML"><input type="hidden" name="emoji" value="heart">{% csrf_token %}<button type="submit" class="reactions-quick-btn" title="❤️">❤️</button></form>
    <form hx-post="{% url 'issues:react' c.pk %}" hx-target="closest .reactions" hx-swap="outerHTML"><input type="hidden" name="emoji" value="tada">{% csrf_token %}<button type="submit" class="reactions-quick-btn" title="🎉">🎉</button></form>
    <form hx-post="{% url 'issues:react' c.pk %}" hx-target="closest .reactions" hx-swap="outerHTML"><input type="hidden" name="emoji" value="rocket">{% csrf_token %}<button type="submit" class="reactions-quick-btn" title="🚀">🚀</button></form>
    <form hx-post="{% url 'issues:react' c.pk %}" hx-target="closest .reactions" hx-swap="outerHTML"><input type="hidden" name="emoji" value="eyes">{% csrf_token %}<button type="submit" class="reactions-quick-btn" title="👀">👀</button></form>
  </span>
</div>

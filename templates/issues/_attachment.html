<div class="attachment-thumb">
  {% if a.content_type and a.content_type|slice:":6" == "image/" %}
    <a href="{{ a.data_url }}" target="_blank"><img src="{{ a.data_url }}" alt="{{ a.filename }}"></a>
  {% else %}
    📎
  {% endif %}
  <a href="{{ a.data_url }}" download="{{ a.filename }}">{{ a.filename }}</a>
  <span style="color:var(--ink-500);">— {{ a.uploaded_by }} · {{ a.uploaded_at|date:"DATETIME_FORMAT" }} · {{ a.size_human }}</span>
</div>

<form class="comment" id="comment-{{ c.pk }}"
      hx-post="{% url 'issues:comment_edit' c.pk %}" hx-target="this" hx-swap="outerHTML">
  {% csrf_token %}
  {% include "_avatar.html" with u=c.author %}
  <div class="body" style="background:white; border:1px solid var(--blue-200);">
    <textarea name="body" rows="3" autofocus data-mentions="1">{{ c.body }}</textarea>
    <div style="margin-top:6px;">
      <button class="btn small" type="submit">Guardar</button>
      <button class="btn ghost small" type="button"
              hx-get="{% url 'issues:comment_edit' c.pk %}?cancel=1"
              hx-target="#comment-{{ c.pk }}" hx-swap="outerHTML">Cancelar</button>
    </div>
  </div>
</form>

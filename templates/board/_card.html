<div class="card-issue" data-key="{{ issue.key }}" style="border-left-color:{{ issue.priority.color }};">
  <div style="display:flex; gap:6px; align-items:flex-start;">
    <input type="checkbox" class="card-select" value="{{ issue.key }}" onclick="event.stopPropagation()">
    <div style="flex:1;">
      <div><a href="{{ issue.get_absolute_url }}">{{ issue.key }}</a> — {{ issue.summary }}</div>
      <div class="meta">
        <span><span class="badge {{ issue.issue_type.category }}">{{ issue.issue_type.name }}</span></span>
        <span>{% if issue.assignee %}{% include "_avatar.html" with u=issue.assignee %}{% else %}<span style="color:var(--ink-300);">—</span>{% endif %}</span>
      </div>
    </div>
  </div>
</div>
